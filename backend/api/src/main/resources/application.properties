spring.application.name=api

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Pool de conexiones optimizado para Neon (serverless)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:15000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME_MS:0}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}

jwt.secret=${JWT_SECRET:}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

security.rate-limit.login.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
security.rate-limit.login.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
security.rate-limit.login.block-seconds=${LOGIN_RATE_LIMIT_BLOCK_SECONDS:300}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=40MB
server.tomcat.max-swallow-size=50MB
