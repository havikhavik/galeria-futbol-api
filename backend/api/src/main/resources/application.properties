spring.application.name=api

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Pool de conexiones optimizado para Neon (serverless)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000

jwt.secret=${JWT_SECRET:}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

security.rate-limit.login.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
security.rate-limit.login.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
security.rate-limit.login.block-seconds=${LOGIN_RATE_LIMIT_BLOCK_SECONDS:300}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=40MB
server.tomcat.max-swallow-size=50MB
